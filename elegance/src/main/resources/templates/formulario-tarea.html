<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Nueva Tarea', links=null)}"></head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar(active='tareas', tipo='admin')}"></div>

<main class="flex-grow-1">
    <section class="py-5" style="background: linear-gradient(135deg, #1A1A1A 0%, #2d2d2d 100%);">
        <div class="container text-center text-white">
            <h1 class="display-4 fw-bold" style="font-family: 'Playfair Display', serif;">
                <i class="fas fa-plus-circle me-3 text-gold"></i>Nueva Tarea
            </h1>
            <hr class="divisor-columna">
            <p class="lead">Registra una nueva actividad en el panel de control</p>
        </div>
    </section>

    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header py-3" style="background: var(--color-oscuro);">
                        <h3 class="mb-0 text-white" style="font-family: 'Playfair Display', serif;">
                            <i class="fas fa-clipboard-list me-2"></i>Detalles de la Tarea
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/tasks/add}" th:object="${tarea}" method="post" novalidate>
                            <div class="mb-4">
                                <label for="titulo" class="form-label fw-bold">
                                    <i class="fas fa-heading me-1 text-gold"></i>Título
                                </label>
                                <input type="text" id="titulo" th:field="*{titulo}" class="form-control form-control-lg"
                                       placeholder="Ej: Revisar inventario de anillos"
                                       th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}"
                                     th:errors="*{titulo}">Error en título</div>
                            </div>

                            <div class="mb-4">
                                <label for="descripcion" class="form-label fw-bold">
                                    <i class="fas fa-align-left me-1 text-gold"></i>Descripción
                                </label>
                                <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="4"
                                          placeholder="Describe los detalles de la tarea..."
                                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}"
                                     th:errors="*{descripcion}">Error en descripción</div>
                            </div>

                            <div class="mb-4">
                                <label for="fechaLimite" class="form-label fw-bold">
                                    <i class="fas fa-calendar-alt me-1 text-gold"></i>Fecha Límite
                                </label>
                                <input type="date" id="fechaLimite" th:field="*{fechaLimite}" class="form-control form-control-lg"
                                       th:classappend="${#fields.hasErrors('fechaLimite')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaLimite')}"
                                     th:errors="*{fechaLimite}">Error en fecha</div>
                            </div>

                            <div class="mb-4 form-check form-check-lg">
                                <input type="checkbox" id="completada" th:field="*{completada}" class="form-check-input"
                                       style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                                <label for="completada" class="form-check-label fw-bold" style="cursor: pointer;">
                                    Marcar como completada
                                </label>
                            </div>

                            <hr class="divisor-columna my-4">

                            <div class="d-flex gap-3 justify-content-end">
                                <a th:href="@{/tasks}" class="btn btn-outline-dark px-4">
                                    <i class="fas fa-times me-2"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-principal px-5">
                                    <i class="fas fa-save me-2"></i>Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer-admin :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
