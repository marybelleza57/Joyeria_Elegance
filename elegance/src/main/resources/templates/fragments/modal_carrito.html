<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Modal Carrito de Compras -->
    <div th:fragment="modalCarrito" class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h4 class="modal-title fw-bold text-dark pt-2" style="font-family: 'Outfit', sans-serif;">
                        <i class="fas fa-shopping-cart text-gold me-2"></i>Carrito de Compras
                    </h4>
                    <button type="button" class="btn-close me-1 mt-1" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3" style="width: 50px; height: 3px; background-color: var(--color-oro, #D3AF37);"></div>

                    <!-- Contenido dinámico del carrito -->
                    <div id="carrito-vacio-msg" class="text-center py-5">
                        <i class="fas fa-shopping-basket text-muted opacity-25 mb-3" style="font-size: 4rem;"></i>
                        <h5 class="fw-bold text-dark">Tu carrito está vacío</h5>
                        <p class="text-muted small">Explora nuestro catálogo y agrega productos exclusivos a tu colección.</p>
                    </div>

                    <div id="carrito-con-items" style="display: none;">
                        <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
                            <table class="table align-middle">
                                <thead class="table-light small text-uppercase tracking-wider">
                                    <tr>
                                        <th>Producto</th>
                                        <th>Material</th>
                                        <th>Precio</th>
                                        <th style="width: 130px;">Cantidad</th>
                                        <th>Subtotal</th>
                                        <th style="width: 50px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="carrito-tbody">
                                    <!-- Se llena dinámicamente con JS -->
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-3">
                            <span class="h5 fw-bold text-dark">Total:</span>
                            <span class="h4 fw-bold text-gold" id="carrito-total-monto">S/. 0.00</span>
                        </div>

                        <div class="mt-4 d-flex justify-content-end gap-2">
                            <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Seguir comprando</button>
                            <button class="btn btn-principal px-4" id="btn-proceder-pago">Proceder al Pago <i class="fas fa-arrow-right ms-1"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
