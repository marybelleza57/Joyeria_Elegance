<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Modal Completar Datos Personales -->
    <div th:fragment="modalCompletarDatos" class="modal fade" id="modalCompletarDatos" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <button type="button" class="btn-close me-1 mt-1" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div class="icon-box mb-3 text-warning">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3.5rem;"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-2" style="font-family: 'Outfit', sans-serif;">Datos Personales Incompletos</h4>
                    <p class="text-muted small px-3">
                        Para poder proceder con el pago de tus compras, es obligatorio registrar todos tus datos personales en tu perfil (Nombres, Apellidos, Teléfono, Dirección, Departamento y Provincia).
                    </p>
                    
                    <div class="d-grid gap-2 mt-4 px-3">
                        <a href="/cliente/configuracion" class="btn btn-principal py-2.5 fw-semibold shadow-sm">
                            <i class="fas fa-user-edit me-2"></i>Completar mis datos
                        </a>
                        <button type="button" class="btn btn-light py-2 text-muted small" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
