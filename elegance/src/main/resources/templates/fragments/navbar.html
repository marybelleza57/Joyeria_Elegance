<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="navbar (active, tipo)">
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase d-flex align-items-center" th:href="@{/}" style="font-family: 'Outfit', sans-serif; letter-spacing: 2px; font-size: 1.4rem;">
                <span style="color: var(--color-oro); margin-right: 6px;">Joyería</span> 
                <span style="color: var(--color-negro-elegante);">Elegante</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center" th:if="${tipo == 'publico'}">
                    <li class="nav-item"><a class="nav-link" th:classappend="${active == 'inicio'} ? 'active' : ''" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${active == 'catalogo'} ? 'active' : ''" th:href="@{/catalogo}">Catálogo</a></li>
                    <!-- Si no está logueado -->
                    <li class="nav-item" th:if="${session.usuarioLogueado == null}">
                        <a class="btn btn-outline-oro ms-lg-3 px-3 py-1.5" href="#" data-bs-toggle="modal" data-bs-target="#modalLogin">
                            <i class="fas fa-user me-2"></i>Registrarse / Iniciar Sesión
                        </a>
                    </li>
                    
                    <!-- Si está logueado -->
                    <li class="nav-item dropdown" th:if="${session.usuarioLogueado != null}">
                        <a class="dropdown-toggle btn btn-usuario-logged ms-lg-3 px-3 py-1.5 d-flex align-items-center" href="#" id="navbarDropdownCliente" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user me-2"></i><span th:text="${session.usuarioLogueado.nombres}">Cliente</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow mt-2" aria-labelledby="navbarDropdownCliente" style="border-radius: 8px;">
                            <li><a class="dropdown-item py-2 fw-semibold text-dark" th:href="@{/cliente/configuracion}"><i class="fas fa-cog me-2 text-muted"></i>Configuración</a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item py-2 text-danger fw-semibold" th:href="@{/cliente/logout}"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative ms-3" href="#" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                            <i class="fas fa-shopping-cart fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center" th:if="${tipo == 'admin'}">
                    <li class="nav-item"><a class="nav-link" th:classappend="${active == 'inicio'} ? 'active' : ''" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${active == 'tareas'} ? 'active' : ''" th:href="@{/tasks}">Tareas</a></li>
                    <li class="nav-item">
                        <a class="nav-link position-relative ms-3" href="#" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                            <i class="fas fa-shopping-cart fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
