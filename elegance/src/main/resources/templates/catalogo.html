<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Catálogo', links=null)}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar(active='catalogo', tipo='publico')}"></div>

<main class="flex-grow-1">
    <!-- Header del Catálogo -->
    <header class="bg-dark text-white text-center py-5" style="background: linear-gradient(rgba(26,26,26,0.8), rgba(26,26,26,0.8)), url('/images/fotoportada.webp') center/cover;">
        <div class="container py-4">
            <h1 class="display-4 fw-bold text-uppercase" style="letter-spacing: 2px;">Nuestras Colecciones</h1>
            <div class="divisor-columna"></div>
            <p class="lead text-white-50">Explora la exclusividad en cada detalle.</p>
        </div>
    </header>

    <div class="container py-5">
        <div class="row g-5">
            <!-- Sidebar / Filtros -->
            <aside class="col-lg-3">
                <div class="card border-0 shadow-sm rounded-0 sticky-top" style="top: 100px;">
                        <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                            <h3 class="h5 fw-bold mb-0">Filtrar Colección</h3>
                            <hr class="mt-2" style="border-color: var(--color-oro); width: 40px; border-width: 2px; opacity: 1;">
                        </div>
                        <div class="card-body">
                            <!-- Categorías -->
                            <h4 class="h6 fw-bold mb-3 text-uppercase text-muted">Categorías</h4>
                            <ul class="list-unstyled mb-4" style="max-height: 220px; overflow-y: auto; padding-right: 10px;">
                                <li class="mb-2">
                                    <a href="#" class="filtro-categoria text-decoration-none text-dark fw-bold text-gold d-flex justify-content-between align-items-center" data-id="todos">
                                        <span>Todos</span>
                                    </a>
                                </li>
                                <li class="mb-2" th:each="cat : ${categorias}">
                                    <a href="#" class="filtro-categoria text-decoration-none text-dark d-flex justify-content-between align-items-center" th:data-id="${cat?.id}">
                                        <span th:text="${cat?.nombre}">Nombre</span>
                                    </a>
                                </li>
                            </ul>

                            <!-- Precio -->
                            <h4 class="h6 fw-bold mb-3 text-uppercase text-muted">Precio</h4>
                            <div class="form-check mb-2">
                                <input class="form-check-input filtro-precio" type="radio" name="precio" id="precio-todos" value="todos" checked>
                                <label class="form-check-label text-dark" for="precio-todos" style="cursor:pointer;">Todos los precios</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filtro-precio" type="radio" name="precio" id="precio1" value="0-500">
                                <label class="form-check-label text-dark" for="precio1" style="cursor:pointer;">Menos de $500</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filtro-precio" type="radio" name="precio" id="precio2" value="500-1500">
                                <label class="form-check-label text-dark" for="precio2" style="cursor:pointer;">$500 - $1500</label>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input filtro-precio" type="radio" name="precio" id="precio3" value="1500-999999">
                                <label class="form-check-label text-dark" for="precio3" style="cursor:pointer;">Más de $1500</label>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Grid de Joyas -->
                <section class="col-lg-9">
                    <!-- Barra superior de resultados -->
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <span class="text-muted">Mostrando <strong class="text-dark" id="contador-resultados" th:text="${#lists.size(productos)}">0</strong> resultados</span>
                        <select id="select-ordenar" class="form-select w-auto border-0 bg-transparent fw-medium shadow-none" style="cursor: pointer;">
                            <option value="novedades">Ordenar por: Novedades</option>
                            <option value="menor-mayor">Ordenar por: Precio (Menor a Mayor)</option>
                            <option value="mayor-menor">Ordenar por: Precio (Mayor a Menor)</option>
                        </select>
                    </div>

                    <div class="row g-4" id="grid-productos">
                        <!-- Joya Dinámica -->
                        <div class="col-12 col-md-6 col-xl-4 producto-item" th:each="producto, iterStat : ${productos}"
                             th:data-categoria="${producto?.categoriaId}" 
                             th:data-precio="${producto?.precio}"
                             th:data-orden="${iterStat.index}">
                            <div class="tarjeta-joya h-100 position-relative bg-white">
                                <div class="position-absolute top-0 start-0 m-3 z-1" th:if="${producto?.destacado}">
                                    <span class="badge rounded-0 fw-normal px-2 py-1" style="background-color: var(--color-oro);">DESTACADO</span>
                                </div>
                                <div class="position-relative overflow-hidden">
                                    <img th:src="@{${producto?.imagenPrincipal != null ? producto.imagenPrincipal : 'img/anillo-diamante.jpg'}}" th:alt="${producto?.nombre}" class="img-responsiva w-100" style="aspect-ratio: 1/1; object-fit: cover;">
                                    <div class="iconos-overlay">
                                        <i class="far fa-heart shadow-sm" title="Añadir a lista de deseos"></i>
                                        <i class="fas fa-search shadow-sm" title="Vista rápida"></i>
                                    </div>
                                </div>
                                <div class="p-4 text-center">
                                    <span class="d-block text-muted small mb-1 text-uppercase tracking-wide" style="letter-spacing: 1px;" th:text="${producto?.material}">Material</span>
                                    <h3 class="h6 mb-2 text-dark font-weight-bold" th:text="${producto?.nombre}">Nombre de la Joya</h3>
                                    <p class="precio text-gold fw-bold fs-5 mb-3" style="color: var(--color-oro);" th:text="${'$' + producto?.precio}">$0.00</p>
                                    <button class="btn btn-carrito w-100 rounded-0 text-uppercase fw-bold" 
                                            th:data-id="${producto?.id}"
                                            th:data-nombre="${producto?.nombre}"
                                            th:data-precio="${producto?.precio}"
                                            th:data-imagen="${producto?.imagenPrincipal}"
                                            th:data-material="${producto?.material}"
                                            style="font-size: 0.85rem; letter-spacing: 1px;">Añadir al carrito</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Paginación UI -->
                    <nav class="mt-5 d-flex justify-content-center">
                        <ul class="pagination pagination-sm">
                            <li class="page-item disabled"><a class="page-link border-0 text-dark" href="#">&laquo;</a></li>
                            <li class="page-item active"><a class="page-link border-0 bg-dark text-white rounded-circle mx-1" href="#" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">1</a></li>
                            <li class="page-item"><a class="page-link border-0 text-dark" href="#">&raquo;</a></li>
                        </ul>
                    </nav>
                </section>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
    <!-- Modales (Si existen) -->
    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
    <script th:src="@{/js/cart.js}"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const gridProductos = document.getElementById('grid-productos');
        const productosList = Array.from(document.querySelectorAll('.producto-item'));
        let categoriaSeleccionada = 'todos';

        const aplicarFiltrosYOrden = () => {
            const precioRadio = document.querySelector('.filtro-precio:checked');
            const rangoPrecio = precioRadio ? precioRadio.value : 'todos';
            const metodoOrden = document.getElementById('select-ordenar').value;

            let [minPrecio, maxPrecio] = [0, Infinity];
            if (rangoPrecio !== 'todos') {
                [minPrecio, maxPrecio] = rangoPrecio.split('-').map(Number);
            }

            // Aplicar Filtro
            let visibles = 0;
            let productosVisibles = [];

            productosList.forEach(prod => {
                const catId = prod.getAttribute('data-categoria');
                const precio = parseFloat(prod.getAttribute('data-precio') || 0);

                const coincideCategoria = (categoriaSeleccionada === 'todos' || catId === String(categoriaSeleccionada));
                const coincidePrecio = (precio >= minPrecio && precio <= maxPrecio);

                if (coincideCategoria && coincidePrecio) {
                    prod.style.display = 'block';
                    prod.style.animation = 'none';
                    prod.offsetHeight; // Reflow
                    prod.style.animation = 'fadeInUp 0.4s ease forwards';
                    visibles++;
                    productosVisibles.push(prod);
                } else {
                    prod.style.display = 'none';
                }
            });

            document.getElementById('contador-resultados').textContent = visibles;

            // Aplicar Ordenamiento
            productosVisibles.sort((a, b) => {
                const precioA = parseFloat(a.getAttribute('data-precio') || 0);
                const precioB = parseFloat(b.getAttribute('data-precio') || 0);
                const ordenA = parseInt(a.getAttribute('data-orden') || 0);
                const ordenB = parseInt(b.getAttribute('data-orden') || 0);

                if (metodoOrden === 'menor-mayor') {
                    return precioA - precioB;
                } else if (metodoOrden === 'mayor-menor') {
                    return precioB - precioA;
                } else {
                    return ordenA - ordenB; // Novedades (por defecto de bd)
                }
            });

            // Re-adjuntar al DOM en el nuevo orden
            productosVisibles.forEach(prod => gridProductos.appendChild(prod));
        };

        // Manejar clics en Categorías
        document.querySelectorAll('.filtro-categoria').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.filtro-categoria').forEach(b => {
                    b.classList.remove('fw-bold', 'text-gold');
                    b.style.color = '';
                });
                btn.classList.add('fw-bold', 'text-gold');
                btn.style.color = 'var(--color-oro)';
                categoriaSeleccionada = btn.getAttribute('data-id');
                aplicarFiltrosYOrden();
            });
        });

        // Manejar cambios en precio
        document.querySelectorAll('.filtro-precio').forEach(radio => {
            radio.addEventListener('change', aplicarFiltrosYOrden);
        });

        // Manejar ordenamiento
        document.getElementById('select-ordenar').addEventListener('change', aplicarFiltrosYOrden);
    });
    </script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Scrollbar styling para la lista de Categorías */
        .list-unstyled::-webkit-scrollbar {
            width: 6px;
        }
        .list-unstyled::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .list-unstyled::-webkit-scrollbar-thumb {
            background: #ccc; 
            border-radius: 4px;
        }
        .list-unstyled::-webkit-scrollbar-thumb:hover {
            background: var(--color-oro); 
        }
    </style>
</body>
</html>
