<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Cambiar Contraseña', links=null)}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar(active='inicio', tipo='publico')}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container py-4">

            <!-- Encabezado de la página -->
            <div class="text-center mb-5">
                <h1 class="display-5 fw-bold text-uppercase"
                    style="font-family: 'Outfit', sans-serif; letter-spacing: 2px;">Mi Panel de Cuenta</h1>
                <div class="divisor-columna mx-auto"
                    style="width: 60px; height: 3px; background-color: var(--color-oro, #D3AF37);"></div>
                <p class="text-muted mt-2">Administra tu información, historial de compras y preferencias.</p>
            </div>

            <!-- Alertas de éxito y error -->
            <div class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert"
                th:if="${mensajeExito != null}">
                <i class="fas fa-check-circle me-2 text-success"></i>
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4" role="alert"
                th:if="${mensajeError != null}">
                <i class="fas fa-exclamation-circle me-2 text-danger"></i>
                <span th:text="${mensajeError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row g-4">
                <!-- Barra Lateral de Opciones (Sidebar) -->
                <aside class="col-lg-3">
                    <div th:replace="~{fragments/cliente_sidebar :: sidebar(active='contraseña')}"></div>
                </aside>

                <!-- Contenido de las Opciones -->
                <section class="col-lg-9">
                    <div class="card border-0 shadow-sm rounded-0">
                        <div class="card-header bg-white border-bottom py-3 px-4">
                            <h4 class="mb-0 fw-bold h5 text-dark text-uppercase tracking-wider"
                                style="font-family: 'Outfit', sans-serif;">
                                <i class="fas fa-shield-alt me-2 text-gold"></i> Actualizar Seguridad de Cuenta
                            </h4>
                        </div>
                        <div class="card-body p-4 p-md-5">
                            <form id="formPassCliente" th:action="@{/cliente/configuracion/cambiar-contrasena}"
                                method="POST" class="needs-validation" novalidate>

                                <!-- Contraseña Actual -->
                                <div class="mb-4">
                                    <label for="inputContrasenaActual"
                                        class="form-label fw-semibold text-dark small mb-1">Contraseña Actual
                                        *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"
                                            style="border-color: #dee2e6;"><i
                                                class="fas fa-lock text-muted"></i></span>
                                        <input type="password" name="contrasenaActual"
                                            class="form-control bg-white border-start-0 border-end-0 ps-1"
                                            id="inputContrasenaActual" placeholder="••••••••" required
                                            style="border-color: #dee2e6;">
                                        <button
                                            class="btn btn-outline-light border-start-0 border-top border-bottom border-end text-muted pe-3 d-flex align-items-center toggle-password-btn"
                                            type="button" data-target="inputContrasenaActual"
                                            style="border-color: #dee2e6; background-color: #ffffff; border-radius: 0 0.375rem 0.375rem 0; z-index: 10;">
                                            <i class="fas fa-eye-slash"></i>
                                        </button>
                                        <div class="invalid-feedback">Debes ingresar tu contraseña actual para
                                            realizar cambios.</div>
                                    </div>
                                </div>

                                <!-- Nueva Contraseña -->
                                <div class="mb-4">
                                    <label for="inputNuevaContrasena"
                                        class="form-label fw-semibold text-dark small mb-1">Nueva Contraseña
                                        *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"
                                            style="border-color: #dee2e6;"><i
                                                class="fas fa-key text-muted"></i></span>
                                        <input type="password" name="nuevaContrasena"
                                            class="form-control bg-white border-start-0 border-end-0 ps-1"
                                            id="inputNuevaContrasena" placeholder="Escribe tu nueva contraseña"
                                            required style="border-color: #dee2e6;">
                                        <button
                                            class="btn btn-outline-light border-start-0 border-top border-bottom border-end text-muted pe-3 d-flex align-items-center toggle-password-btn"
                                            type="button" data-target="inputNuevaContrasena"
                                            style="border-color: #dee2e6; background-color: #ffffff; border-radius: 0 0.375rem 0.375rem 0; z-index: 10;">
                                            <i class="fas fa-eye-slash"></i>
                                        </button>
                                        <div class="invalid-feedback">La nueva contraseña debe tener al menos 6
                                            caracteres.</div>
                                    </div>
                                </div>

                                <!-- Confirmar Nueva Contraseña -->
                                <div class="mb-4">
                                    <label for="inputConfirmarContrasena"
                                        class="form-label fw-semibold text-dark small mb-1">Confirmar Nueva
                                        Contraseña *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"
                                            style="border-color: #dee2e6;"><i
                                                class="fas fa-check-double text-muted"></i></span>
                                        <input type="password" name="confirmarContrasena"
                                            class="form-control bg-white border-start-0 border-end-0 ps-1"
                                            id="inputConfirmarContrasena"
                                            placeholder="Confirma tu nueva contraseña" required
                                            style="border-color: #dee2e6;">
                                        <button
                                            class="btn btn-outline-light border-start-0 border-top border-bottom border-end text-muted pe-3 d-flex align-items-center toggle-password-btn"
                                            type="button" data-target="inputConfirmarContrasena"
                                            style="border-color: #dee2e6; background-color: #ffffff; border-radius: 0 0.375rem 0.375rem 0; z-index: 10;">
                                            <i class="fas fa-eye-slash"></i>
                                        </button>
                                        <div class="invalid-feedback">Las contraseñas no coinciden.</div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end mt-4 pt-2">
                                    <button type="submit" class="btn btn-principal px-5 py-2.5 shadow-sm">
                                        Cambiar Contraseña <i class="fas fa-key ms-2"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Modales -->
    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Validación de Contraseña
            const formPass = document.getElementById("formPassCliente");
            const passActual = document.getElementById("inputContrasenaActual");
            const passNueva = document.getElementById("inputNuevaContrasena");
            const passConf = document.getElementById("inputConfirmarContrasena");

            function validarContrasenaActual() {
                if (passActual.value === "") {
                    passActual.classList.add("is-invalid");
                    return false;
                } else {
                    passActual.classList.remove("is-invalid");
                    return true;
                }
            }

            function validarNuevaContrasena() {
                if (passNueva.value === "" || passNueva.value.length < 6) {
                    passNueva.classList.add("is-invalid");
                    return false;
                } else {
                    passNueva.classList.remove("is-invalid");
                    return true;
                }
            }

            function validarConfirmacion() {
                if (passConf.value === "" || passConf.value !== passNueva.value) {
                    passConf.classList.add("is-invalid");
                    return false;
                } else {
                    passConf.classList.remove("is-invalid");
                    return true;
                }
            }

            passActual.addEventListener("input", validarContrasenaActual);
            passNueva.addEventListener("input", validarNuevaContrasena);
            passConf.addEventListener("input", validarConfirmacion);

            formPass.addEventListener("submit", function (event) {
                const cAct = validarContrasenaActual();
                const cNue = validarNuevaContrasena();
                const cConf = validarConfirmacion();

                if (!cAct || !cNue || !cConf) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                formPass.classList.add("was-validated");
            });

            // Toggle Contraseñas
            document.querySelectorAll(".toggle-password-btn").forEach(btn => {
                btn.addEventListener("click", function () {
                    const targetId = btn.getAttribute("data-target");
                    const input = document.getElementById(targetId);
                    const icon = btn.querySelector("i");
                    if (input.type === "password") {
                        input.type = "text";
                        icon.classList.remove("fa-eye-slash");
                        icon.classList.add("fa-eye");
                    } else {
                        input.type = "password";
                        icon.classList.remove("fa-eye");
                        icon.classList.add("fa-eye-slash");
                    }
                });
            });
        });
    </script>

    <style>
        /* Estilo del Sidebar Activo */
        #settings-list .list-group-item {
            color: var(--color-gris-oscuro, #4A4A4A);
            background-color: #ffffff;
            transition: all 0.25s ease;
            border-left: 3px solid transparent !important;
        }

        #settings-list .list-group-item:hover {
            background-color: #f8f9fa;
            color: var(--color-oro, #D3AF37);
        }

        #settings-list .list-group-item.active {
            background-color: #f8f9fa !important;
            color: var(--color-oro, #D3AF37) !important;
            border-left: 3px solid var(--color-oro, #D3AF37) !important;
        }

        /* Desactivar checkmarks verdes de validación de Bootstrap */
        .was-validated .form-control:valid,
        .form-control.is-valid,
        .was-validated .form-control:valid:focus,
        .form-control.is-valid:focus {
            border-color: #dee2e6 !important;
            background-image: none !important;
            padding-right: 0.75rem !important;
            box-shadow: none !important;
        }

        .btn-principal {
            background-color: var(--color-oro, #D3AF37) !important;
            border-color: var(--color-oro, #D3AF37) !important;
            color: #ffffff !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 10px 24px;
            border-radius: 0px;
            transition: all 0.3s ease;
        }

        .btn-principal:hover,
        .btn-principal:focus,
        .btn-principal:active {
            background-color: var(--color-negro-elegante, #1A1A1A) !important;
            border-color: var(--color-negro-elegante, #1A1A1A) !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15) !important;
        }

        .text-gold {
            color: var(--color-oro, #D3AF37) !important;
        }
    </style>

</body>

</html>
