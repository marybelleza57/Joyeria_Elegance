<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Restablecer Contraseña', links=null)}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{fragments/navbar :: navbar(active='inicio', tipo='publico')}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-5">
                            <h2 class="text-center mb-4 fw-bold">Restablecer Contraseña</h2>
                            <p class="text-muted text-center mb-4">Ingresa tu nueva contraseña.</p>

                            <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
                            <div class="alert alert-success" th:if="${mensajeExito != null}" th:text="${mensajeExito}">
                            </div>

                            <form th:action="@{/cliente/restablecer-contrasena}" method="POST">
                                <input type="hidden" name="token" th:value="${token}">

                                <div class="mb-3">
                                    <label for="nuevaContrasena" class="form-label fw-semibold">Nueva contraseña</label>
                                    <div class="input-group">
                                        <input type="password" name="nuevaContrasena" id="nuevaContrasena"
                                            class="form-control" placeholder="Mínimo 6 caracteres" required
                                            minlength="6">
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggleNuevaContrasena">
                                            <i class="fas fa-eye-slash" id="eyeIconNueva"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmarContrasena" class="form-label fw-semibold">Confirmar
                                        contraseña</label>
                                    <div class="input-group">
                                        <input type="password" name="confirmarContrasena" id="confirmarContrasena"
                                            class="form-control" placeholder="Repite tu contraseña" required>
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggleConfirmarContrasena">
                                            <i class="fas fa-eye-slash" id="eyeIconConfirmar"></i>
                                        </button>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-principal w-100 py-2">
                                    Restablecer Contraseña
                                </button>
                            </form>

                            <div class="text-center mt-4">
                                <a th:href="@{/}" class="btn btn-outline-gold px-4 py-2">
                                    <i class="fas fa-arrow-left me-2"></i> Volver al inicio
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
    <script th:src="@{/js/cart.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggleNueva = document.getElementById('toggleNuevaContrasena');
            const nuevaInput = document.getElementById('nuevaContrasena');
            const eyeIconNueva = document.getElementById('eyeIconNueva');

            toggleNueva.addEventListener('click', function () {
                if (nuevaInput.type === 'password') {
                    nuevaInput.type = 'text';
                    eyeIconNueva.classList.remove('fa-eye-slash');
                    eyeIconNueva.classList.add('fa-eye');
                } else {
                    nuevaInput.type = 'password';
                    eyeIconNueva.classList.remove('fa-eye');
                    eyeIconNueva.classList.add('fa-eye-slash');
                }
            });

            const toggleConfirmar = document.getElementById('toggleConfirmarContrasena');
            const confirmarInput = document.getElementById('confirmarContrasena');
            const eyeIconConfirmar = document.getElementById('eyeIconConfirmar');

            toggleConfirmar.addEventListener('click', function () {
                if (confirmarInput.type === 'password') {
                    confirmarInput.type = 'text';
                    eyeIconConfirmar.classList.remove('fa-eye-slash');
                    eyeIconConfirmar.classList.add('fa-eye');
                } else {
                    confirmarInput.type = 'password';
                    eyeIconConfirmar.classList.remove('fa-eye');
                    eyeIconConfirmar.classList.add('fa-eye-slash');
                }
            });
        });
    </script>

    <style>
        .btn-outline-gold {
            color: #D3AF37;
            border: 2px solid #D3AF37;
            background-color: transparent;
            border-radius: 0;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-outline-gold:hover {
            background-color: #D3AF37;
            color: #fff;
            border-color: #D3AF37;
        }

        .btn-outline-gold:active {
            transform: scale(0.98);
        }

        .btn-outline-secondary {
            border-color: #dee2e6;
            background-color: white;
        }

        .btn-outline-secondary:hover {
            background-color: #f8f9fa;
        }
    </style>

</body>

</html>
