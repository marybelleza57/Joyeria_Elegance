<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Inicio', links=null)}"></head>

<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar(active='inicio', tipo='publico')}"></div>

    <main class="flex-grow-1">
        <section class="hero-banner d-flex align-items-center justify-content-center">
            <div class="container text-center text-white">
                <h1 class="display-3 fw-bold mb-4">Descubre Nuestra Colección de Lujo</h1>
                <a th:href="@{/catalogo}" class="btn btn-principal btn-lg">Ver Colección</a>
            </div>
        </section>

        <section class="ventajas-iconos container py-5">
            <div class="row text-center">
                <div class="col-md-4 icono-item mb-4">
                    <i class="fas fa-dollar-sign"></i>
                    <p>Devolución 100% Garantizada</p>
                </div>
                <div class="col-md-4 icono-item mb-4">
                    <i class="fas fa-truck"></i>
                    <p>Envío Gratuito a Nivel Nacional</p>
                </div>
                <div class="col-md-4 icono-item mb-4">
                    <i class="fas fa-file-invoice"></i>
                    <p>Notas de Crédito por Devoluciones</p>
                </div>
            </div>
        </section>

        <section class="container py-5">
            <h2 class="text-center mb-5">Productos Más Vendidos</h2>
            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-4" th:each="producto : ${joyasDestacadas}">
                    <div class="tarjeta-joya shadow-sm h-100">
                        <div class="position-relative overflow-hidden">
                            <img th:src="@{${producto?.imagenPrincipal != null ? producto.imagenPrincipal : 'img/anillo-diamante.jpg'}}"
                                th:alt="${producto?.nombre}" class="img-responsiva w-100"
                                style="aspect-ratio: 1/1; object-fit: cover;">
                            <div class="iconos-overlay">
                                <i class="far fa-heart" data-bs-toggle="modal" data-bs-target="#modalConfirmar"></i>
                            </div>
                        </div>
                        <div class="p-4 text-center">
                            <h3 class="h5" th:text="${producto?.nombre}">Nombre de la Joya</h3>
                            <p class="precio text-gold fw-bold" th:text="${'S/. ' + producto?.precio}">S/. 0.00</p>
                            <p class="text-muted small">
                                <i class="fas fa-box me-1"></i>
                                Disponibles: <span
                                    th:text="${producto?.cantidad != null ? producto.cantidad : 0}">0</span> unidades
                            </p>
                            <button class="btn btn-carrito w-100" data-bs-toggle="popover" title="Material"
                                th:attr="data-bs-content=${producto?.material}">Detalles de Pieza</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>



        <div th:replace="~{fragments/footer :: footer}"></div>
        <div th:replace="~{fragments/modales :: modales}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/scripts.js}"></script>
        <script th:src="@{/js/cart.js}"></script>
</body>

</html>
