<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Categorías', links=~{::link})}">
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <!-- Admin Custom CSS -->
    <link th:href="@{/css/admin.css?v=10}" rel="stylesheet" type="text/css">
</head>

<body style="font-family: 'Inter', sans-serif; background-color: var(--color-claro);">

    <nav th:replace="~{fragments/admin-components :: topbar}"></nav>

    <div class="container-fluid">
        <div class="row">
            <nav th:replace="~{fragments/admin-components :: sidebar(activeTab='Categorías')}"></nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-5">
                <!-- Alertas de Éxito / Error -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4"
                    role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4"
                    role="alert">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${success}">Operación exitosa</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="admin-page-title">Estructura de Categorías</h2>
                    <button class="btn btn-principal text-uppercase fw-bold rounded-pill px-4 text-white" onclick="abrirModalNuevaCategoria()"><i class="fas fa-plus me-2"></i> Nueva Categoría</button>
                </div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4">
                        
                            <table class="table table-hover align-middle mb-0 datatable" id="tabla-categorias">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="text-uppercase text-muted fw-bold small py-3 px-4 border-0">Nombre de Categoría</th>

                                        <th class="text-uppercase text-muted fw-bold small py-3 text-end px-4 border-0">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cat : ${categorias}">
                                        <td class="fw-bold text-dark px-4">
                                            <i class="fas fa-tag text-gold me-2"></i> <span th:text="${cat.nombre}">Nombre</span>
                                        </td>

                                        <td class="text-end px-4">
                                            <button class="btn btn-sm btn-outline-dark rounded-3 me-1" title="Modificar" th:data-id="${cat.id}" th:data-nombre="${cat.nombre}" th:data-descripcion="${cat.descripcion}" th:data-estado="${cat.estado}" onclick="abrirModalEditarCategoria(this)"><i class="fas fa-edit"></i></button>
                                            <button class="btn btn-sm btn-outline-danger rounded-3" title="Eliminar" th:data-id="${cat.id}" th:data-nombre="${cat.nombre}" onclick="abrirModalEliminarCategoria(this)"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div th:replace="~{fragments/modales :: modales}"></div>
    
    <!-- Modal Categoría -->
    <div class="modal fade" id="modalCategoria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-uppercase" id="modalCategoriaTitle">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/categorias/guardar}" method="post">
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="catId">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small mb-1">Nombre</label>
                            <input type="text" name="nombre" id="catNombre" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small mb-1">Descripci&oacute;n</label>
                            <textarea name="descripcion" id="catDescripcion" class="form-control rounded-3" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small mb-1">Estado</label>
                            <select name="estado" id="catEstado" class="form-select rounded-3">
                                <option value="ACTIVO">ACTIVO</option>
                                <option value="INACTIVO">INACTIVO</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 pe-4">
                        <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" id="btnSubmitCategoria" class="btn btn-principal rounded-3 text-white px-4">Crear Categoría</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Eliminaci&oacute;n Categoría -->
    <div class="modal fade" id="modalEliminarCategoria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-danger"><i class="fas fa-exclamation-triangle me-2"></i> Confirmar Eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="mb-0">¿Está seguro de que desea eliminar la categoría <strong id="catEliminarNombre"></strong>?</p>
                </div>
                <div class="modal-footer border-0 pb-4 pe-4">
                    <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancelar</button>
                    <a id="enlaceEliminarCategoria" href="#" class="btn btn-danger rounded-3 text-white px-4 text-decoration-none">Eliminar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.min.js"></script>
    <script th:src="@{/js/admin.js?v=10}"></script>
    <script>
        function abrirModalNuevaCategoria() {
            document.getElementById('modalCategoriaTitle').innerText = 'Nueva Categoría';
            document.getElementById('btnSubmitCategoria').innerText = 'Crear Categoría';
            document.getElementById('catId').value = '';
            document.getElementById('catNombre').value = '';
            document.getElementById('catDescripcion').value = '';
            document.getElementById('catEstado').value = 'ACTIVO';
            new bootstrap.Modal(document.getElementById('modalCategor\u00eda')).show();
        }
        function abrirModalEditarCategoria(btn) {
            document.getElementById('modalCategoriaTitle').innerText = 'Modificar Categoría';
            document.getElementById('btnSubmitCategoria').innerText = 'Guardar Cambios';
            document.getElementById('catId').value = btn.getAttribute('data-id');
            document.getElementById('catNombre').value = btn.getAttribute('data-nombre');
            document.getElementById('catDescripcion').value = btn.getAttribute('data-descripcion') || '';
            document.getElementById('catEstado').value = btn.getAttribute('data-estado') || 'ACTIVO';
            new bootstrap.Modal(document.getElementById('modalCategor\u00eda')).show();
        }
        function abrirModalEliminarCategoria(btn) {
            var catId = btn.getAttribute('data-id');
            var catNombre = btn.getAttribute('data-nombre');
            document.getElementById('catEliminarNombre').innerText = catNombre;
            document.getElementById('enlaceEliminarCategoria').href = '/admin/categorias/eliminar/' + catId;
            new bootstrap.Modal(document.getElementById('modalEliminarCategoria')).show();
        }
    </script>
</body>
</html>
