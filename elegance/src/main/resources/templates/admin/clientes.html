<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Clientes', links=~{::link})}">
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <!-- Admin Custom CSS -->
    <link th:href="@{/css/admin.css?v=10}" rel="stylesheet" type="text/css">
</head>

<body style="font-family: 'Inter', sans-serif; background-color: var(--color-claro);">

    <nav th:replace="~{fragments/admin-components :: topbar}"></nav>

    <div class="container-fluid">
        <div class="row">
            <nav th:replace="~{fragments/admin-components :: sidebar(activeTab='clientes')}"></nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="admin-page-title">Clientes</h2>
                    <button class="btn btn-outline-dark rounded-pill px-4 text-uppercase fw-bold shadow-sm"><i
                            class="fas fa-file-export me-2"></i> Exportar Lista</button>
                </div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4">

                        <table class="table table-hover align-middle mb-0 datatable" id="tabla-clientes">
                            <thead class="bg-light">
                                <tr>
                                    <th class="text-uppercase text-muted fw-bold small py-3 px-4 border-0">Nombre</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Apellidos</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Género</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Contacto</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Preferencia</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Estado</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 text-end px-4 border-0">
                                        Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(clientes)}">
                                    <td colspan="7" class="text-center py-5 text-muted">No hay clientes registrados.
                                    </td>
                                </tr>
                                <tr th:each="cliente : ${clientes}">
                                    <td class="fw-bold text-dark px-4" th:text="${cliente.nombres}">Nombre</td>
                                    <td class="text-dark" th:text="${cliente.apellidos}">Apellidos</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${cliente.genero == 'MASCULINO' ? 'bg-primary' : (cliente.genero == 'FEMENINO' ? 'bg-danger' : 'bg-secondary')}"
                                            th:text="${cliente.genero == 'MASCULINO' ? 'Masculino' : (cliente.genero == 'FEMENINO' ? 'Femenino' : 'No decir')}">
                                            Masculino
                                        </span>
                                    </td>
                                    <td>
                                        <div class="small fw-bold" th:text="${cliente.correo}">email@.com</div>
                                        <div class="small text-muted" th:text="${cliente.telefono}">+51</div>
                                    </td>
                                    <td>
                                        <span class="badge"
                                            style="background-color: var(--color-oro); color: #fff; padding: 6px 10px; border-radius: 6px;"
                                            th:text="${cliente.preferencia != null ? cliente.preferencia : 'Sin preferencia'}">
                                            Anillo
                                        </span>
                                    </td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${cliente.estado == 'ACTIVO' ? 'bg-success' : (cliente.estado == 'SUSPENDIDO' ? 'bg-danger' : 'bg-secondary')}"
                                            th:text="${cliente.estado}">
                                            ACTIVO
                                        </span>
                                    </td>
                                    <td class="text-end px-4">
                                        <div class="d-flex justify-content-end gap-1">
                                            <button
                                                class="btn btn-sm btn-warning text-dark rounded-3 btn-editar-cliente"
                                                th:data-id="${cliente.id}" th:data-nombres="${cliente.nombres}"
                                                th:data-apellidos="${cliente.apellidos}"
                                                th:data-correo="${cliente.correo}"
                                                th:data-telefono="${cliente.telefono}" th:data-dni="${cliente.dni}"
                                                th:data-direccion="${cliente.direccion}"
                                                th:data-departamento="${cliente.departamento}"
                                                th:data-provincia="${cliente.provincia}"
                                                th:data-preferencia="${cliente.preferencia}"
                                                th:data-genero="${cliente.genero}" th:data-estado="${cliente.estado}"
                                                data-bs-toggle="modal" data-bs-target="#modalEditarCliente">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <button
                                                class="btn btn-sm btn-danger text-white rounded-3 btn-suspender-cliente"
                                                th:data-id="${cliente.id}" th:data-nombre="${cliente.nombres}"
                                                th:data-estado="${cliente.estado}" data-bs-toggle="modal"
                                                data-bs-target="#modalSuspenderCliente">
                                                <i class="fas fa-user-slash"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Editar Cliente -->
    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-uppercase">Editar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/clientes/actualizar}" method="POST">
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="editClienteId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Nombres</label>
                                <input type="text" name="nombres" id="editClienteNombres" class="form-control rounded-3"
                                    required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Apellidos</label>
                                <input type="text" name="apellidos" id="editClienteApellidos"
                                    class="form-control rounded-3" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Correo</label>
                                <input type="email" name="correo" id="editClienteCorreo" class="form-control rounded-3"
                                    required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Teléfono</label>
                                <input type="text" name="telefono" id="editClienteTelefono"
                                    class="form-control rounded-3">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">DNI</label>
                                <input type="text" name="dni" id="editClienteDni" class="form-control rounded-3">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Género</label>
                                <select name="genero" id="editClienteGenero" class="form-select rounded-3">
                                    <option value="MASCULINO">Masculino</option>
                                    <option value="FEMENINO">Femenino</option>
                                    <option value="PREFIERO_NO_DECIR">Prefiero no decir</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Departamento</label>
                                <input type="text" name="departamento" id="editClienteDepartamento"
                                    class="form-control rounded-3">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Provincia</label>
                                <input type="text" name="provincia" id="editClienteProvincia"
                                    class="form-control rounded-3">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small mb-1">Dirección</label>
                            <input type="text" name="direccion" id="editClienteDireccion"
                                class="form-control rounded-3">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Preferencia Material</label>
                                <select name="preferencia" id="editClientePreferencia" class="form-select rounded-3">
                                    <option value="">Seleccionar</option>
                                    <option value="Plata bañada en oro rosa">Plata bañada en oro rosa</option>
                                    <option value="Plata 925 / Perla">Plata 925 / Perla</option>
                                    <option value="Plata 925 / Hilo">Plata 925 / Hilo</option>
                                    <option value="Plata 925">Plata 925</option>
                                    <option value="Plata / Hilo">Plata / Hilo</option>
                                    <option value="Oro Blanco 18k">Oro Blanco 18k</option>
                                    <option value="Oro 18k">Oro 18k</option>
                                    <option value="Oro 14k">Oro 14k</option>
                                    <option value="Aleación de zinc / Silicona">Aleación de zinc / Silicona</option>
                                    <option value="Acero inoxidable">Acero inoxidable</option>
                                    <option value="Acero dorado / Terciopelo">Acero dorado / Terciopelo</option>
                                    <option value="Acero bañado en oro">Acero bañado en oro</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold small mb-1">Estado</label>
                                <select name="estado" id="editClienteEstado" class="form-select rounded-3">
                                    <option value="ACTIVO">ACTIVO</option>
                                    <option value="INACTIVO">INACTIVO</option>
                                    <option value="SUSPENDIDO">SUSPENDIDO</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 pe-4">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-principal rounded-3 text-white px-4">Guardar
                            Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Suspender Cliente -->
    <div class="modal fade" id="modalSuspenderCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-danger"><i class="fas fa-exclamation-triangle me-2"></i>
                        Suspender Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="mb-0">
                        ¿Está seguro de que desea <strong id="suspenderAccion">suspender</strong> al cliente
                        <strong id="suspenderClienteNombre"></strong>?
                    </p>
                    <p class="text-muted small mt-2">El cliente no podrá iniciar sesión ni realizar compras.</p>
                </div>
                <div class="modal-footer border-0 pb-4 pe-4">
                    <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancelar</button>
                    <form th:action="@{/admin/clientes/suspender}" method="POST" style="display: inline;">
                        <input type="hidden" name="id" id="suspenderClienteId">
                        <button type="submit" class="btn btn-danger rounded-3 text-white px-4">Suspender</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.min.js"></script>
    <script th:src="@{/js/admin.js?v=10}"></script>

    <script>
        $(document).ready(function () {
            $('.btn-editar-cliente').on('click', function () {
                $('#editClienteId').val($(this).data('id'));
                $('#editClienteNombres').val($(this).data('nombres'));
                $('#editClienteApellidos').val($(this).data('apellidos'));
                $('#editClienteCorreo').val($(this).data('correo'));
                $('#editClienteTelefono').val($(this).data('telefono') || '');
                $('#editClienteDni').val($(this).data('dni') || '');
                $('#editClienteDireccion').val($(this).data('direccion') || '');
                $('#editClienteDepartamento').val($(this).data('departamento') || '');
                $('#editClienteProvincia').val($(this).data('provincia') || '');
                $('#editClientePreferencia').val($(this).data('preferencia') || '');
                $('#editClienteGenero').val($(this).data('genero') || 'PREFIERO_NO_DECIR');
                $('#editClienteEstado').val($(this).data('estado') || 'ACTIVO');
            });

            $('.btn-suspender-cliente').on('click', function () {
                const id = $(this).data('id');
                const nombre = $(this).data('nombre');
                const estado = $(this).data('estado');

                $('#suspenderClienteId').val(id);
                $('#suspenderClienteNombre').text(nombre);

                if (estado === 'SUSPENDIDO') {
                    $('#suspenderAccion').text('activar');
                    $('.btn-danger').text('Activar');
                } else {
                    $('#suspenderAccion').text('suspender');
                    $('.btn-danger').text('Suspender');
                }
            });
        });
    </script>
</body>

</html>
