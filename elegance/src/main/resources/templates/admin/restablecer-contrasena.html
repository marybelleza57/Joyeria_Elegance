<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyería Elegante | Restablecer Contraseña - Admin</title>
    <link rel="icon" type="image/webp" th:href="@{/favicon.webp}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>

<body>

    <div class="login-container">
        <div class="text-center mb-4">
            <h1 class="brand-header text-uppercase m-0">
                <span style="color: #D3AF37;">Joyería</span> <span style="color: #FFFFFF;">Elegante</span>
            </h1>
            <div class="brand-subtitle mt-1">Restablecer Contraseña</div>
        </div>

        <div class="card login-card p-4 p-md-5">

            <div th:if="${error}" class="alert alert-custom alert-dismissible fade show mb-4" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}">Error</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>

            <form th:action="@{/admin/restablecer-contrasena}" method="POST">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="nuevaContrasena" class="form-label mb-2">Nueva Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="nuevaContrasena" name="nuevaContrasena"
                            placeholder="Mínimo 6 caracteres" required minlength="6" style="border-right: none;">
                        <button class="btn btn-toggle-password" type="button" id="toggleNuevaContrasena">
                            <i class="fas fa-eye-slash" id="toggleIconNueva"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmarContrasena" class="form-label mb-2">Confirmar Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="confirmarContrasena" name="confirmarContrasena"
                            placeholder="Repite tu contraseña" required style="border-right: none;">
                        <button class="btn btn-toggle-password" type="button" id="toggleConfirmarContrasena">
                            <i class="fas fa-eye-slash" id="toggleIconConfirmar"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-save me-2"></i> Restablecer Contraseña
                    </button>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/admin/login}" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i> Volver al login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggleNueva = document.getElementById('toggleNuevaContrasena');
            const toggleIconNueva = document.getElementById('toggleIconNueva');
            const nuevaInput = document.getElementById('nuevaContrasena');

            if (toggleNueva && nuevaInput && toggleIconNueva) {
                toggleNueva.addEventListener('click', function () {
                    if (nuevaInput.type === 'password') {
                        nuevaInput.type = 'text';
                        toggleIconNueva.classList.remove('fa-eye-slash');
                        toggleIconNueva.classList.add('fa-eye');
                    } else {
                        nuevaInput.type = 'password';
                        toggleIconNueva.classList.remove('fa-eye');
                        toggleIconNueva.classList.add('fa-eye-slash');
                    }
                });
            }

            const toggleConfirmar = document.getElementById('toggleConfirmarContrasena');
            const toggleIconConfirmar = document.getElementById('toggleIconConfirmar');
            const confirmarInput = document.getElementById('confirmarContrasena');

            if (toggleConfirmar && confirmarInput && toggleIconConfirmar) {
                toggleConfirmar.addEventListener('click', function () {
                    if (confirmarInput.type === 'password') {
                        confirmarInput.type = 'text';
                        toggleIconConfirmar.classList.remove('fa-eye-slash');
                        toggleIconConfirmar.classList.add('fa-eye');
                    } else {
                        confirmarInput.type = 'password';
                        toggleIconConfirmar.classList.remove('fa-eye');
                        toggleIconConfirmar.classList.add('fa-eye-slash');
                    }
                });
            }
        });
    </script>
</body>

</html>
