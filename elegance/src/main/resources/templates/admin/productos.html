<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Productos', links=~{::link})}">
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <!-- Admin Custom CSS -->
    <link th:href="@{/css/admin.css?v=10}" rel="stylesheet" type="text/css">
</head>

<body style="font-family: 'Inter', sans-serif; background-color: var(--color-claro);">

    <nav th:replace="~{fragments/admin-components :: topbar}"></nav>

    <div class="container-fluid">
        <div class="row">
            <nav th:replace="~{fragments/admin-components :: sidebar(activeTab='productos')}"></nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="admin-page-title">Catálogo de Productos</h2>
                    <button class="btn btn-principal text-uppercase fw-bold rounded-pill px-4 text-white"
                        onclick="abrirModalNuevo()"><i
                            class="fas fa-plus me-2"></i> Nuevo Producto</button>
                </div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4">

                        <table class="table table-hover align-middle mb-0 datatable" id="tabla-productos">
                            <thead class="bg-light">
                                <tr>
                                    <th class="text-uppercase text-muted fw-bold small py-3 px-4 border-0">Imagen</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Nombre de la Joya</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Precio</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Cantidad</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Categoría</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 border-0">Estilo</th>
                                    <th class="text-uppercase text-muted fw-bold small py-3 text-end px-4 border-0">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="producto : ${productos}">
                                    <td class="px-4">
                                        <img th:src="@{${producto.imagenPrincipal != null ? producto.imagenPrincipal : 'img/anillo-diamante.jpg'}}"
                                            alt="Joya" width="60" height="60" class="shadow-sm rounded-3"
                                            style="object-fit: cover;">
                                    </td>
                                    <td class="fw-bold text-dark" th:text="${producto.nombre}">Nombre</td>
                                    <td class="text-gold fw-bold" th:text="${'$' + producto.precio}">$0.00</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${producto.cantidad > 0} ? 'bg-success' : 'bg-danger'"
                                            style="letter-spacing: 1px; border-radius: 6px;"
                                            th:text="${producto.cantidad > 0 ? producto.cantidad + ' uds' : 'Agotado'}">0</span>
                                    </td>
                                    <td th:text="${mapaCategorias.get(producto.categoriaId)}">Categoría</td>
                                    <td>
                                        <span class="badge bg-secondary text-uppercase" style="border-radius: 6px; font-size: 0.75rem;" th:text="${producto.orientacionEstilo != null ? producto.orientacionEstilo : 'UNISEX'}">UNISEX</span>
                                    </td>
                                    <td class="text-end px-4">
                                        <button class="btn btn-sm btn-outline-dark me-1 rounded-3" title="Editar"
                                            th:data-id="${producto.id}" th:data-nombre="${producto.nombre}"
                                            th:data-precio="${producto.precio}" th:data-cantidad="${producto.cantidad}"
                                            th:data-material="${producto.material}"
                                            th:data-categoria="${producto.categoriaId}"
                                            th:data-estado="${producto.estado}" th:data-img="${producto.imagenPrincipal}"
                                            th:data-estilo="${producto.orientacionEstilo != null ? producto.orientacionEstilo : 'UNISEX'}"
                                            onclick="abrirModalEditar(this)"><i
                                                class="fas fa-edit"></i></button>
                                        <a th:href="@{/admin/productos/deshabilitar/{id}(id=${producto.id})}"
                                            class="btn btn-sm rounded-3 me-1 text-decoration-none"
                                            th:classappend="${producto.estado == 'ACTIVO'} ? 'btn-outline-warning' : 'btn-outline-success'"
                                            th:title="${producto.estado == 'ACTIVO'} ? 'Deshabilitar' : 'Habilitar'"
                                            th:onclick="${producto.estado == 'ACTIVO'} ? 'return confirm(&#39;¿Desea deshabilitar este producto?&#39;)' : 'return confirm(&#39;¿Desea habilitar este producto?&#39;)'"><i
                                                th:class="${producto.estado == 'ACTIVO'} ? 'fas fa-ban' : 'fas fa-check'"></i></a>
                                        <a th:href="@{/admin/productos/eliminar/{id}(id=${producto.id})}"
                                            class="btn btn-sm btn-outline-danger rounded-3" title="Eliminar"
                                            onclick="return confirm('¿Seguro que desea eliminar este producto?');"><i
                                                class="fas fa-trash-alt"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
        </div>
        </main>
    </div>
    </div>

    <div th:replace="~{fragments/modales :: modales}"></div>

    <!-- Modal Producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-uppercase" id="modalProductoTitle">Detalle de Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data">
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="prodId">
                        <div class="row g-4">
                            <!-- Columna Izquierda: Información del Producto -->
                            <div class="col-md-7 border-end pe-md-4">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nombre</label>
                                    <input type="text" name="nombre" id="prodNombre" class="form-control rounded-3" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Categoría</label>
                                    <select name="categoriaId" id="prodCat" class="form-select rounded-3" required>
                                        <option value="" disabled selected>Seleccione una Categoría</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}">
                                        </option>
                                    </select>
                                </div>
                                <div class="row">
                                    <div class="col-6 mb-3">
                                        <label class="form-label fw-semibold">Precio</label>
                                        <input type="number" step="0.01" name="precio" id="prodPrecio"
                                            class="form-control rounded-3" required>
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label fw-semibold">Cantidad</label>
                                        <input type="number" name="cantidad" id="prodCantidad" class="form-control rounded-3"
                                            required>
                                    </div>
                                </div>
                                 <div class="row">
                                     <div class="col-6 mb-3">
                                         <label class="form-label fw-semibold">Material</label>
                                         <input type="text" name="material" id="prodMaterial" class="form-control rounded-3">
                                     </div>
                                     <div class="col-6 mb-3">
                                         <label class="form-label fw-semibold">Orientación de Estilo</label>
                                         <select name="orientacionEstilo" id="prodEstilo" class="form-select rounded-3">
                                             <option value="UNISEX">UNISEX</option>
                                             <option value="MASCULINO">MASCULINO</option>
                                             <option value="FEMENINO">FEMENINO</option>
                                         </select>
                                     </div>
                                 </div>
                                 <div class="row">
                                     <div class="col-6 mb-3">
                                         <label class="form-label fw-semibold">Estado</label>
                                         <select name="estado" id="prodEstado" class="form-select rounded-3">
                                             <option value="ACTIVO">ACTIVO</option>
                                             <option value="INACTIVO">INACTIVO</option>
                                         </select>
                                     </div>
                                 </div>
                            </div>

                            <!-- Columna Derecha: Carga de Imagen y Vista Previa -->
                            <div class="col-md-5 ps-md-4 d-flex flex-column justify-content-between">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Imagen del Producto</label>
                                    <div class="custom-file-upload">
                                        <label for="imagenArchivo" class="btn btn-outline-dark w-100 py-3 rounded-3 d-flex flex-column align-items-center justify-content-center" style="border: 2px dashed #ccc; background-color: #fafafa; cursor: pointer; transition: all 0.2s;">
                                            <i class="fas fa-cloud-upload-alt fa-2x mb-2 text-muted"></i>
                                            <span id="file-upload-filename" class="small fw-medium text-dark">Seleccionar Imagen</span>
                                            <span class="text-muted" style="font-size: 0.75rem;">JPG, PNG, WebP (Máx. 15MB)</span>
                                        </label>
                                        <input type="file" name="imagenArchivo" id="imagenArchivo" class="d-none" accept="image/*" onchange="mostrarNombreArchivo(this)">
                                    </div>
                                    <small class="text-muted d-block mt-2">Si no seleccionas una imagen, se mantendrá la actual.</small>
                                </div>
                                <div class="card bg-light border-0 rounded-3 p-3 text-center d-flex align-items-center justify-content-center flex-grow-1" style="min-height: 180px;">
                                    <div id="previewPlaceholder" class="text-muted small">
                                        <i class="fas fa-image fa-3x mb-2 text-secondary"></i>
                                        <p class="mb-0">Sin imagen cargada</p>
                                    </div>
                                    <div class="d-none w-100" id="previewContainer">
                                        <label class="form-label d-block text-start fw-semibold small mb-2 text-secondary">Imagen Actual</label>
                                        <img id="prodImagenPreview" src="" alt="Vista previa" class="img-thumbnail rounded-3 shadow-sm" style="max-height: 140px; max-width: 100%; object-fit: contain;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 pe-4">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" id="btnSubmitProducto" class="btn btn-principal rounded-pill px-4 text-white">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.min.js"></script>
    <script th:src="@{/js/admin.js?v=10}"></script>
    <script>
        function abrirModalNuevo() {
            document.getElementById('modalProductoTitle').innerText = 'Nuevo Producto';
            document.getElementById('btnSubmitProducto').innerText = 'Crear Producto';
            document.getElementById('prodId').value = '';
            document.getElementById('prodNombre').value = '';
            document.getElementById('prodPrecio').value = '';
            document.getElementById('prodCantidad').value = '';
            document.getElementById('prodMaterial').value = '';
            document.getElementById('prodCat').value = '';
            document.getElementById('prodEstado').value = 'ACTIVO';
            document.getElementById('prodEstilo').value = 'UNISEX';
            document.getElementById('imagenArchivo').value = '';
            document.getElementById('file-upload-filename').innerText = 'Seleccionar Imagen';
            document.getElementById('previewContainer').classList.add('d-none');
            document.getElementById('previewPlaceholder').classList.remove('d-none');
            document.getElementById('prodImagenPreview').src = '';
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        function abrirModalEditar(btn) {
            document.getElementById('modalProductoTitle').innerText = 'Modificar Producto';
            document.getElementById('btnSubmitProducto').innerText = 'Guardar Cambios';
            document.getElementById('prodId').value = btn.getAttribute('data-id');
            document.getElementById('prodNombre').value = btn.getAttribute('data-nombre');
            document.getElementById('prodPrecio').value = btn.getAttribute('data-precio');
            document.getElementById('prodCantidad').value = btn.getAttribute('data-cantidad');
            document.getElementById('prodMaterial').value = btn.getAttribute('data-material') || '';
            document.getElementById('prodCat').value = btn.getAttribute('data-categoria');
            document.getElementById('prodEstado').value = btn.getAttribute('data-estado') || 'ACTIVO';
            document.getElementById('prodEstilo').value = btn.getAttribute('data-estilo') || 'UNISEX';
            document.getElementById('imagenArchivo').value = '';
            document.getElementById('file-upload-filename').innerText = 'Seleccionar Imagen';
            
            const img = btn.getAttribute('data-img');
            if (img && img !== 'img/productos/ejemplo.jpg' && img !== 'img/anillo-diamante.jpg' && img.trim() !== '') {
                document.getElementById('prodImagenPreview').src = img;
                document.getElementById('previewContainer').classList.remove('d-none');
                document.getElementById('previewPlaceholder').classList.add('d-none');
            } else {
                document.getElementById('previewContainer').classList.add('d-none');
                document.getElementById('previewPlaceholder').classList.remove('d-none');
            }
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        function mostrarNombreArchivo(input) {
            const filenameLabel = document.getElementById('file-upload-filename');
            if (input.files && input.files.length > 0) {
                filenameLabel.innerText = input.files[0].name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('prodImagenPreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('d-none');
                    document.getElementById('previewPlaceholder').classList.add('d-none');
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                filenameLabel.innerText = 'Seleccionar Imagen';
            }
        }
    </script>
</body>

</html>
