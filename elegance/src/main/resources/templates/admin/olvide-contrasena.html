<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyería Elegante | Olvidé mi Contraseña - Admin</title>
    <link rel="icon" type="image/webp" th:href="@{/favicon.webp}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>

<body>

    <div class="login-container">
        <div class="text-center mb-4">
            <h1 class="brand-header text-uppercase m-0">
                <span style="color: #D3AF37;">Joyería</span> <span style="color: #FFFFFF;">Elegante</span>
            </h1>
            <div class="brand-subtitle mt-1">Recuperación de Contraseña</div>
        </div>

        <div class="card login-card p-4 p-md-5">

            <div th:if="${error}" class="alert alert-custom alert-dismissible fade show mb-4" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}">Error</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>

            <div th:if="${mensaje}" class="alert alert-success-custom alert-dismissible fade show mb-4" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${mensaje}">Mensaje de éxito</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>

            <form th:action="@{/admin/olvide-contrasena}" method="POST">
                <div class="mb-4">
                    <label for="email" class="form-label mb-2">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-paper-plane me-2"></i> Enviar enlace de recuperación
                    </button>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/admin/login}" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i> Volver al login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
