<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Panel de Control', links=~{::link})}">
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <!-- Admin Custom CSS -->
    <link th:href="@{/css/admin.css?v=10}" rel="stylesheet" type="text/css">
</head>

<body style="font-family: 'Inter', sans-serif; background-color: var(--color-claro);">

    <!-- Topbar Admin (Modular) -->
    <nav th:replace="~{fragments/admin-components :: topbar}"></nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Admin (Modular) -->
            <nav th:replace="~{fragments/admin-components :: sidebar(activeTab='dashboard')}"></nav>

            <!-- Contenido Principal -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-5">
                <h2 class="admin-page-title mb-4">Métricas Globales</h2>
                <div class="row g-4 mb-5">
                    <div class="col-12 col-md-4">
                        <div
                            class="card stat-card border-0 shadow-sm p-4 bg-white position-relative overflow-hidden rounded-4">
                            <div class="position-absolute top-0 end-0 p-4 opacity-25">
                                <i class="fas fa-gem fa-3x text-gold"></i>
                            </div>
                            <h6 class="text-muted text-uppercase fw-bold mb-2 small" style="letter-spacing: 1px;">Total
                                Productos</h6>
                            <h2 class="display-5 fw-bold text-dark mb-0" th:text="${#lists.size(productos)}">0</h2>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div
                            class="card stat-card border-0 shadow-sm p-4 bg-white position-relative overflow-hidden rounded-4 border-dark">
                            <div class="position-absolute top-0 end-0 p-4 opacity-25">
                                <i class="fas fa-layer-group fa-3x text-dark"></i>
                            </div>
                            <h6 class="text-muted text-uppercase fw-bold mb-2 small" style="letter-spacing: 1px;">
                                Categorías Activas</h6>
                            <h2 class="display-5 fw-bold text-dark mb-0" th:text="${#lists.size(categorias)}">0</h2>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div
                            class="card stat-card border-0 shadow-sm p-4 bg-white position-relative overflow-hidden rounded-4">
                            <div class="position-absolute top-0 end-0 p-4 opacity-25">
                                <i class="fas fa-crown fa-3x text-gold"></i>
                            </div>
                            <h6 class="text-muted text-uppercase fw-bold mb-2 small" style="letter-spacing: 1px;">
                                Clientes</h6>
                            <h2 class="display-5 fw-bold text-dark mb-0" th:text="${#lists.size(clientes)}">0</h2>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modales -->
    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.min.js"></script>
    <!-- Admin Custom JS -->
    <script th:src="@{/js/admin.js?v=10}"></script>
</body>

</html>
