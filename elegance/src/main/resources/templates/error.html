<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Joyería Elegante | Error', links=~{::link})}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{fragments/navbar :: navbar(active='inicio', tipo='publico')}"></div>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 text-center">

                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-warning icon-error"></i>
                    </div>

                    <h1 class="display-1 fw-bold text-dark codigo-error" th:text="${status}">404</h1>

                    <h2 class="h3 fw-bold text-dark mb-3 titulo-error" id="tituloError">Página no encontrada</h2>

                    <p class="text-muted mb-4 mensaje-error" id="mensajeError">
                        Lo sentimos, la página que buscas no existe o ha sido movida.
                    </p>

                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a th:href="@{/}" class="btn btn-principal px-4 py-2">
                            <i class="fas fa-home me-2"></i> Ir al Inicio
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-dark px-4 py-2">
                            <i class="fas fa-arrow-left me-2"></i> Volver
                        </a>
                    </div>

                    <div class="mt-5 pt-4 border-top" th:if="${#environments.acceptsProfiles('dev')}">
                        <details class="text-start">
                            <summary class="text-muted small fw-bold cursor-pointer">
                                <i class="fas fa-code me-1"></i> Detalles técnicos
                            </summary>
                            <div class="mt-3 p-3 bg-dark text-white rounded detalles-tecnicos">
                                <span class="text-danger">Error:</span> <span class="text-warning"
                                    th:text="${error}"></span>
                                <br>
                                <span class="text-danger">Estado:</span> <span class="text-warning"
                                    th:text="${status}"></span>
                                <br>
                                <span class="text-danger">Mensaje:</span> <span class="text-warning"
                                    th:text="${message}"></span>
                                <br>
                                <span class="text-danger">Ruta:</span> <span class="text-warning"
                                    th:text="${path}"></span>
                                <br>
                                <span class="text-danger" th:if="${timestamp}">Fecha:</span>
                                <span class="text-warning" th:if="${timestamp}"
                                    th:text="${#temporals.format(timestamp, 'dd/MM/yyyy HH:mm:ss')}"></span>
                                <br>
                                <span class="text-danger" th:if="${exception}">Excepción:</span>
                                <span class="text-warning" th:if="${exception}" th:text="${exception}"></span>
                            </div>
                        </details>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/modales :: modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/error.js}"></script>
</body>

</html>
